name = "server-monitor-pro"  # 这就是 CF_WORKER_SUBDOMAIN
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 定时任务：
# - "*/2 * * * *" 每 2 分钟检查离线节点（避免每次探针上报都查全表）
# - "0 0 * * *"   每日 UTC 0 点清理 24 小时前的历史数据
[triggers]
crons = ["*/2 * * * *", "0 0 * * *"]

# 静态资源目录
[assets]
directory = "./public"
binding = "ASSETS"

# D1 数据库绑定（通过名称自动匹配，无需 database_id）
[[d1_databases]]
binding = "DB"
database_name = "server-monitor-db"

[vars]

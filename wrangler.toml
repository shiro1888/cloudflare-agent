name = "cloudflare-agent"  # 与 GitHub 仓库同名
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# 定时任务：
# - "*/2 * * * *" 每 2 分钟检查离线节点（避免每次探针上报都查全表）
# - "0 0 * * *"   每日 UTC 0 点清理 24 小时前的历史数据
[triggers]
crons = ["*/2 * * * *", "0 0 * * *"]

# 静态资源目录
[assets]
directory = "./public"
binding = "ASSETS"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "server-monitor-db-apac"
database_id = "da55d31d-7d48-4ebc-8081-c3ab26930fb0"

[vars]

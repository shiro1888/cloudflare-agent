name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'preview/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      # 把 D1 数据库 ID 注入到 wrangler.toml（这个不是机密）
      # API_SECRET / API_USER_NAME 通过 wrangler secret put 注入，不写入文件
      - name: 📝 Inject D1 database_id into wrangler.toml
        run: |
          # 在 [[d1_databases]] 块里追加 database_id（如果还没有）
          if ! grep -q "database_id" wrangler.toml; then
            sed -i '/database_name = "server-monitor-db"/a database_id = "${{ secrets.D1_DATABASE_ID }}"' wrangler.toml
          fi
          echo "✅ wrangler.toml 准备完毕"
          echo "----------------"
          cat wrangler.toml
          echo "----------------"

      # 用 wrangler secret 注入凭据（部署后存为 Worker secrets，不会进入 bundle）
      - name: 🔐 Set Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.API_SECRET }}" | npx wrangler secret put API_SECRET
          echo "${{ secrets.API_USER_NAME }}" | npx wrangler secret put API_USER_NAME

      - name: 🚀 Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy

      - name: ✅ Deployment Success
        if: success()
        run: |
          echo "🎉 部署成功！"
          echo "访问: https://server-monitor-pro.<你的子域>.workers.dev"

      - name: ❌ Deployment Failed
        if: failure()
        run: echo "💥 部署失败！请检查 Actions 日志"

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cloudflare-agent · Server Monitor</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📡%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13.5/dist/cdn.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        }
      }
    };
  </script>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-2: #fafafa;
      --border: #ececec;
      --border-strong: #d4d4d4;
      --text: #171717;
      --text-2: #737373;
      --text-3: #a3a3a3;
      --accent: #171717;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --blue: #2563eb;
    }
    .dark {
      --bg: #0a0a0a;
      --surface: #0f0f0f;
      --surface-2: #161616;
      --border: #1f1f1f;
      --border-strong: #2a2a2a;
      --text: #f5f5f5;
      --text-2: #a3a3a3;
      --text-3: #737373;
      --accent: #f5f5f5;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
      --blue: #3b82f6;
    }
    html, body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .surface { background: var(--surface); border-color: var(--border); }
    .border-soft { border-color: var(--border); }
    .text-2 { color: var(--text-2); }
    .text-3 { color: var(--text-3); }
    .hover-bg:hover { background: var(--surface-2); }
    [x-cloak] { display: none !important; }

    /* 极细滚动条 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

    /* 进度条 */
    .bar { background: var(--border); height: 2px; border-radius: 999px; overflow: hidden; }
    .bar > div { height: 100%; transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

    /* ============== 丝滑微交互 · Smooth Like Butter ============== */

    html { scroll-behavior: smooth; }
    button, a { -webkit-tap-highlight-color: transparent; }

    /* 核心曲线：所有动画都基于这几条 */
    :root {
      --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);    /* 主力曲线 - 极速进入 极慢收尾 */
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);    /* 进入动画 */
      --ease-out-quint: cubic-bezier(0.22, 1, 0.36, 1);   /* 切换 */
      --ease-in-out-quart: cubic-bezier(0.76, 0, 0.24, 1);/* 双向 */
    }

    /* 卡片：轻盈悬浮，无回弹 */
    .card-hover {
      transition: transform .7s var(--ease-out-expo),
                  border-color .5s var(--ease-out-expo),
                  box-shadow .7s var(--ease-out-expo);
    }
    .card-hover:hover {
      transform: translateY(-3px);
      border-color: var(--border-strong);
      box-shadow: 0 16px 32px -16px rgba(0,0,0,.12), 0 4px 12px -4px rgba(0,0,0,.04);
    }
    .dark .card-hover:hover {
      box-shadow: 0 16px 32px -16px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04);
    }
    .card-hover:active {
      transform: translateY(-1px);
      transition-duration: .25s;
    }

    /* 入场：纯丝滑，无超调 */
    .stagger > * {
      opacity: 0;
      transform: translateY(12px);
      animation: fade-rise .9s var(--ease-out-expo) forwards;
    }
    .stagger > *:nth-child(1)  { animation-delay: .04s; }
    .stagger > *:nth-child(2)  { animation-delay: .08s; }
    .stagger > *:nth-child(3)  { animation-delay: .12s; }
    .stagger > *:nth-child(4)  { animation-delay: .16s; }
    .stagger > *:nth-child(5)  { animation-delay: .2s; }
    .stagger > *:nth-child(6)  { animation-delay: .24s; }
    .stagger > *:nth-child(7)  { animation-delay: .28s; }
    .stagger > *:nth-child(8)  { animation-delay: .32s; }
    .stagger > *:nth-child(9)  { animation-delay: .36s; }
    .stagger > *:nth-child(10) { animation-delay: .4s; }
    .stagger > *:nth-child(11) { animation-delay: .44s; }
    .stagger > *:nth-child(12) { animation-delay: .48s; }
    @keyframes fade-rise {
      to { opacity: 1; transform: translateY(0); }
    }

    /* 按钮：缓速过渡，无弹跳 */
    .btn { transition: background .35s var(--ease-out-expo), border-color .35s var(--ease-out-expo), opacity .35s var(--ease-out-expo); }
    .btn:active { opacity: .8; }
    .chip { transition: all .35s var(--ease-out-expo); }
    .chip:active { opacity: .7; }

    /* 视图切换：crossfade + 微缩放 - 像 macOS 切换桌面 */
    .view-fade {
      animation: view-glide .7s var(--ease-out-expo);
    }
    @keyframes view-glide {
      0%   { opacity: 0; transform: scale(.985) translateY(8px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Tab 滑块：丝滑滑动，无超调 */
    .seg-indicator {
      position: absolute;
      top: 4px; bottom: 4px;
      background: var(--surface);
      border-radius: 7px;
      box-shadow: 0 1px 2px rgba(0,0,0,.06), 0 0 0 1px var(--border);
      transition: left .65s var(--ease-out-expo), width .65s var(--ease-out-expo);
      z-index: 1;
      pointer-events: none;
    }
    .dark .seg-indicator {
      box-shadow: 0 1px 2px rgba(0,0,0,.3), 0 0 0 1px var(--border-strong);
    }
    .seg-item {
      transition: color .4s var(--ease-out-expo);
    }

    /* 进度条：缓慢丝滑增长 */
    .bar { background: var(--border); height: 2px; border-radius: 999px; overflow: hidden; position: relative; }
    .bar > div {
      height: 100%;
      transition: width 1.4s var(--ease-out-expo);
    }

    /* 数值变化：纯色彩过渡，不缩放 */
    .num-flash {
      animation: num-soft 1.6s var(--ease-out-expo);
    }
    @keyframes num-soft {
      0%   { color: var(--blue); }
      100% { color: inherit; }
    }

    /* 状态点 - 缓慢呼吸 */
    .dot-pulse {
      animation: dot-breathe 3s var(--ease-in-out-quart) infinite;
    }
    @keyframes dot-breathe {
      0%, 100% { opacity: 1; }
      50%      { opacity: .35; }
    }
    .dot-ring { position: relative; }
    .dot-ring::before {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      opacity: 0;
      animation: dot-ripple 3s var(--ease-out-expo) infinite;
    }
    @keyframes dot-ripple {
      0%   { opacity: .7; transform: scale(.3); }
      80%  { opacity: 0;  transform: scale(2); }
      100% { opacity: 0;  transform: scale(2); }
    }

    /* Toast: 简洁滑入，无旋转 */
    .toast {
      animation: toast-glide .5s var(--ease-out-expo);
    }
    @keyframes toast-glide {
      0%   { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* 链接下划线：丝滑展开 */
    .link-anim { position: relative; display: inline-block; }
    .link-anim::after {
      content: '';
      position: absolute; left: 0; right: 0; bottom: -2px; height: 1px;
      background: currentColor;
      transform: scaleX(0); transform-origin: right;
      transition: transform .55s var(--ease-out-expo);
    }
    .link-anim:hover::after { transform: scaleX(1); transform-origin: left; }

    /* Modal：从中心丝滑展开 */
    .pop-in { animation: modal-fade .45s var(--ease-out-expo); }
    @keyframes modal-fade {
      0%   { opacity: 0; transform: scale(.96); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* 抽屉：平滑滑入，无回弹 */
    .drawer-in { animation: drawer-glide .55s var(--ease-out-expo); }
    @keyframes drawer-glide {
      0%   { transform: translateX(100%); }
      100% { transform: translateX(0); }
    }

    /* 命令面板 */
    .cmd-pop { animation: cmd-glide .4s var(--ease-out-expo); }
    @keyframes cmd-glide {
      0%   { opacity: 0; transform: translateY(-12px) scale(.97); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 表格行：横向轻滑 */
    .tbl tbody tr {
      transition: background .35s var(--ease-out-expo), transform .55s var(--ease-out-expo);
    }
    .tbl tbody tr:hover { transform: translateX(3px); }

    /* 详情面板内部：依次丝滑入场 */
    .detail-section > * {
      opacity: 0;
      transform: translateY(16px);
      animation: fade-rise .8s var(--ease-out-expo) forwards;
    }
    .detail-section > *:nth-child(1) { animation-delay: .08s; }
    .detail-section > *:nth-child(2) { animation-delay: .16s; }
    .detail-section > *:nth-child(3) { animation-delay: .24s; }
    .detail-section > *:nth-child(4) { animation-delay: .32s; }
    .detail-section > *:nth-child(5) { animation-delay: .4s; }
    /* 图表容器需要保留绝对尺寸，避免 Chart.js 测量错误 */
    .detail-section canvas { display: block; }

    .seg-item.active { color: var(--text); font-weight: 600; }

    /* 标题：丝滑入场 */
    .title-pop {
      opacity: 0;
      transform: translateY(16px);
      animation: fade-rise 1s var(--ease-out-expo) forwards;
    }

    /* 遮罩淡入 */
    .overlay-fade { animation: overlay-fade .4s var(--ease-out-expo); }
    @keyframes overlay-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    h1 { letter-spacing: -.02em; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
      }
    }

    /* 按钮 */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      height: 32px; padding: 0 12px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
    }
    .btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
    .btn-primary {
      background: var(--text); color: var(--bg); border-color: var(--text);
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-ghost {
      border-color: transparent; background: transparent;
    }
    .btn-ghost:hover { background: var(--surface-2); }

    /* Tab 切换 - segmented control 风格 */
    .seg {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .seg-item {
      position: relative;
      z-index: 2;
      padding: 6px 22px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: color .2s ease;
      background: transparent;
      border: none;
      border-radius: 7px;
      white-space: nowrap;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .seg-item:focus { outline: none; }
    .seg-item:focus-visible { box-shadow: 0 0 0 2px var(--border-strong); }
    .seg-item:hover { color: var(--text); }
    .seg-item.active { color: var(--text); }
    .seg-indicator {
      position: absolute;
      top: 4px;
      bottom: 4px;
      background: var(--surface);
      border-radius: 7px;
      box-shadow: 0 1px 2px rgba(0,0,0,.06), 0 0 0 1px var(--border);
      transition: left .3s cubic-bezier(.4,.8,.2,1), width .3s cubic-bezier(.4,.8,.2,1);
      z-index: 1;
      pointer-events: none;
    }
    .dark .seg-indicator {
      background: var(--surface);
      box-shadow: 0 1px 2px rgba(0,0,0,.3), 0 0 0 1px var(--border-strong);
    }

    /* 旧 tab 保留兼容 */
    .tab {
      padding: 6px 12px; border-radius: 6px;
      font-size: 13px; font-weight: 500; color: var(--text-2);
      cursor: pointer; transition: color .15s, background .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); background: var(--surface-2); }

    /* Chip / Pill */
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      height: 26px; padding: 0 10px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface);
      font-size: 12px; color: var(--text-2);
      cursor: pointer; transition: all .15s ease;
    }
    .chip:hover { border-color: var(--border-strong); color: var(--text); }
    .chip.active {
      background: var(--text); color: var(--bg); border-color: var(--text);
    }
    .chip.active .chip-count { color: var(--bg); opacity: 0.6; }
    .chip-count { color: var(--text-3); margin-left: 2px; font-variant-numeric: tabular-nums; }

    /* 表格 */
    .tbl { width: 100%; font-size: 13px; }
    .tbl th {
      text-align: left; padding: 10px 16px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.02em;
      color: var(--text-3); text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .tbl td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .tbl tbody tr { transition: background .12s; }
    .tbl tbody tr:hover { background: var(--surface-2); }
    .tbl tbody tr:last-child td { border-bottom: 0; }

    /* 浅淡的进入动画 */
    .fade-in { animation: fade .25s ease-out; }
    @keyframes fade {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* keyboard kbd */
    .kbd {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      border: 1px solid var(--border); border-radius: 4px;
      background: var(--surface-2);
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--text-2);
    }

    /* 地图样式 */
    .leaflet-container { background: var(--surface) !important; }
    .dark .leaflet-tile { filter: invert(1) hue-rotate(180deg) brightness(.95) contrast(.85); }
    .leaflet-control-attribution { display: none !important; }

    /* Toast */
    .toast-stack { position: fixed; bottom: 16px; right: 16px; z-index: 70; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--text); color: var(--bg);
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
      min-width: 200px; max-width: 320px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
  </style>
</head>
<body x-data="dashboard()" x-init="init()" :class="theme === 'dark' ? 'dark' : ''">

  <!-- ============================ 顶部导航 ============================ -->
  <header class="surface border-b border-soft sticky top-0 z-40">
    <div class="max-w-[1280px] mx-auto px-6 h-14 flex items-center gap-4 relative">
      <!-- Logo -->
      <a href="#" class="flex items-center gap-2 flex-shrink-0">
        <div class="w-7 h-7 rounded-md flex items-center justify-center" style="background:var(--text);color:var(--bg)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="font-semibold text-[15px] tracking-tight hidden sm:block">cloudflare-agent</div>
      </a>

      <!-- 视图切换：segmented control，居中（移动端贴在 logo 右边、桌面端绝对居中） -->
      <nav class="md:absolute md:left-1/2 md:-translate-x-1/2">
        <div class="seg" x-ref="seg">
          <div class="seg-indicator" :style="segStyle"></div>
          <template x-for="(v, idx) in views" :key="v.id">
            <button class="seg-item" :data-seg-idx="idx" :class="currentView === v.id ? 'active' : ''" @click="currentView = v.id" x-text="v.label"></button>
          </template>
        </div>
      </nav>

      <!-- 右侧操作区 -->
      <div class="ml-auto flex items-center gap-2 relative z-10">
        <!-- 搜索按钮 -->
        <button @click="cmdOpen = true" class="btn btn-ghost hidden lg:inline-flex" title="搜索 (Ctrl+K)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <span class="text-2 text-[13px]">搜索</span>
          <span class="kbd ml-1">⌘K</span>
        </button>

        <!-- 主题切换 -->
        <button @click="theme = theme === 'dark' ? 'light' : 'dark'" class="btn btn-ghost" :title="theme === 'dark' ? '浅色' : '深色'">
          <template x-if="theme === 'dark'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          </template>
          <template x-if="theme !== 'dark'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </template>
        </button>

        <!-- 管理后台 -->
        <a href="admin.html" class="btn btn-primary">
          <span class="hidden sm:inline">管理后台</span>
          <svg class="sm:hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>
      </div>
    </div>
  </header>

  <!-- ============================ 主内容 ============================ -->
  <main class="max-w-[1280px] mx-auto px-6 py-8 fade-in">

    <!-- 标题区 -->
    <div class="flex items-end justify-between mb-8 flex-wrap gap-3">
      <div>
        <h1 class="text-2xl font-semibold tracking-tight title-pop">Servers</h1>
        <p class="text-2 text-sm mt-1 title-pop" style="animation-delay:.1s">实时监控所有服务器状态 · 共 <span x-text="servers.length"></span> 台</p>
      </div>
      <div class="flex items-center gap-2 text-xs text-3 title-pop" style="animation-delay:.2s">
        <span class="w-1.5 h-1.5 rounded-full dot-pulse dot-ring" style="background:var(--green); color:var(--green)"></span>
        <span>实时同步 · <span class="tabular-nums" x-text="liveSeconds + 's'"></span></span>
      </div>
    </div>

    <!-- 概览卡（极简，无渐变无光晕） -->
    <section class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-8 stagger" :key="'sum-'+liveSeconds">
      <template x-for="card in summary" :key="card.id">
        <div class="surface border border-soft rounded-lg p-4 card-hover">
          <div class="text-xs text-3 mb-1.5" x-text="card.label"></div>
          <div class="flex items-baseline gap-2">
            <span class="text-2xl font-semibold tracking-tight tabular-nums num-flash" :key="card.value" x-text="card.value"></span>
            <span class="text-xs" :style="`color:${card.trend > 0 ? 'var(--green)' : card.trend < 0 ? 'var(--red)' : 'var(--text-3)'}`" x-text="card.trend !== 0 ? (card.trend > 0 ? '+' : '') + card.trend + '%' : ''"></span>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    function dashboard() {
      const COUNTRIES = ['HK','SG','JP','US','DE','FR','CN'];
      const NAMES = ['tokyo-01','hk-edge','frankfurt','sg-app','la-cdn','paris-1','seoul','osaka','ny-edge','london','beijing','sv-pop'];
      const rand = (a,b) => Math.round(a + Math.random()*(b-a));
      const fmtBytes = (b) => {
        if (b === 0) return '0 B';
        const k=1024, s=['B','KB','MB','GB','TB'], i=Math.floor(Math.log(b)/Math.log(k));
        return parseFloat((b/Math.pow(k,i)).toFixed(1)) + s[i];
      };
      const seed = [];
      for (let i = 0; i < 12; i++) {
        const country = COUNTRIES[i % COUNTRIES.length];
        const online = i !== 4;
        seed.push({
          id: 'srv-'+(i+1),
          name: NAMES[i] || ('node-'+i),
          country,
          group: ['亚太','欧美','其他'][i%3],
          online,
          cpu: online ? rand(5,90) : 0,
          ram: online ? rand(15,85) : 0,
          disk: online ? rand(10,80) : 0,
          netIn: fmtBytes(online ? rand(5e3, 5e7) : 0),
          netOut: fmtBytes(online ? rand(5e3, 3e7) : 0),
          monthlyRx: fmtBytes(rand(1e9, 4e11)),
          monthlyTx: fmtBytes(rand(1e9, 2e11)),
          os: ['Ubuntu 22.04','Debian 12','CentOS 9','Rocky 9'][i%4] + ' · ' + ['x86_64','aarch64'][i%2],
          arch: ['x86_64','aarch64'][i%2],
          pingCt: rand(20,260),
          pingCu: rand(25,300),
          pingCm: rand(30,250),
          pingBd: rand(15,200),
          lastUpdate: rand(2,55),
          uptime: rand(1,90)+'d '+rand(0,23)+'h',
          load: (Math.random()*4).toFixed(2),
          ramTotal: rand(2,32),
          diskTotal: rand(40,500),
        });
      }

      return {
        theme: 'light',
        currentView: 'cards',
        activeFilter: 'all',
        statusFilter: 'all',
        sortBy: 'cpu-desc',
        servers: seed,
        cmdOpen: false,
        cmdQuery: '',
        cmdActive: 0,
        toasts: [],
        showDemoNotice: false,
        detailOpen: false,
        detailServer: null,
        detailRange: '1h',
        detailCharts: [],
        liveSeconds: 0,
        segStyle: 'left:3px;width:0px;',

        views: [
          { id: 'cards', label: '卡片' },
          { id: 'table', label: '列表' },
          { id: 'map',   label: '地图' },
        ],
        statusFilters: [
          { id: 'all', label: '全部' },
          { id: 'online', label: '在线', dotColor: 'var(--green)' },
          { id: 'offline', label: '离线', dotColor: 'var(--red)' },
        ],
        sortOptions: [
          { id: 'cpu-desc',  label: 'CPU 高→低' },
          { id: 'cpu-asc',   label: 'CPU 低→高' },
          { id: 'ram-desc',  label: 'RAM 高→低' },
          { id: 'ram-asc',   label: 'RAM 低→高' },
          { id: 'name-asc',  label: '名称 A→Z' },
        ],

        get filters() {
          const map = {};
          for (const s of this.servers) map[s.country] = (map[s.country]||0) + 1;
          const arr = [{ code:'all', label:'全部', count: this.servers.length }];
          Object.entries(map).sort().forEach(([c,n]) => arr.push({ code:c, label:c, count:n }));
          return arr;
        },
        get filteredServers() {
          let arr = this.servers.slice();
          if (this.activeFilter !== 'all') arr = arr.filter(s => s.country.toLowerCase() === this.activeFilter.toLowerCase());
          if (this.statusFilter === 'online')  arr = arr.filter(s => s.online);
          if (this.statusFilter === 'offline') arr = arr.filter(s => !s.online);
          const [field, dir] = this.sortBy.split('-');
          arr.sort((a,b) => {
            const av = a[field], bv = b[field];
            if (typeof av === 'string') return dir==='asc' ? av.localeCompare(bv) : bv.localeCompare(av);
            return dir==='asc' ? av-bv : bv-av;
          });
          return arr;
        },
        get summary() {
          const online = this.servers.filter(s => s.online).length;
          const offline = this.servers.length - online;
          const avgCpu = Math.round(this.servers.reduce((a,b)=>a+b.cpu,0) / this.servers.length);
          return [
            { id:'total', label:'服务器总数', value: this.servers.length, sub: `<span style="color:var(--green)">●</span> 在线 ${online} · <span style="color:var(--red)">●</span> 离线 ${offline}`, trend: 0 },
            { id:'cpu',   label:'平均 CPU',  value: avgCpu + '%', sub: '所有节点平均使用率', trend: -2 },
            { id:'speed', label:'实时速率',  value: '128MB/s', sub: '↑ 42MB/s', trend: 12 },
            { id:'traffic', label:'本月流量', value: '4.2TB', sub: '↑ 1.8TB', trend: 8 },
          ];
        },
        get detailInfos() {
          if (!this.detailServer) return [];
          const s = this.detailServer;
          return [
            { l:'状态',     v: s.online ? '在线' : '离线' },
            { l:'运行时间', v: s.uptime },
            { l:'架构',     v: s.arch },
            { l:'负载',     v: s.load },
            { l:'内存',     v: s.ramTotal + ' GiB' },
            { l:'磁盘',     v: s.diskTotal + ' GiB' },
          ];
        },
        get cmdResults() {
          const q = (this.cmdQuery || '').toLowerCase().trim();
          const items = [];
          for (const s of this.servers) {
            if (!q || s.name.toLowerCase().includes(q) || s.country.toLowerCase().includes(q))
              items.push({ key:'srv-'+s.id, icon: s.online?'🟢':'🔴', title: s.name, subtitle: s.country + ' · CPU ' + s.cpu + '%', kind:'服务器', action: () => this.openDetail(s) });
          }
          for (const v of this.views) {
            if (!q || v.label.includes(q))
              items.push({ key:'v-'+v.id, icon:'→', title:'切换到 '+v.label, subtitle:'视图', kind:'导航', action: () => { this.currentView = v.id; this.toast('切换到 '+v.label, '👁'); } });
          }
          [
            { k:'theme', t:'切换主题',   ic:'🎨', a: () => { this.theme = this.theme==='dark'?'light':'dark'; this.toast('已切换主题','🎨'); } },
            { k:'on',    t:'只看在线',   ic:'🟢', a: () => { this.statusFilter='online'; this.toast('已过滤在线','✅'); } },
            { k:'all',   t:'清除过滤',   ic:'✕',  a: () => { this.statusFilter='all'; this.activeFilter='all'; this.toast('已清除过滤','✓'); } },
          ].forEach(o => { if (!q || o.t.includes(q)) items.push({ key:'op-'+o.k, icon:o.ic, title:o.t, subtitle:'操作', kind:'命令', action:o.a }); });
          return items.slice(0, 8);
        },

        // ====== utils ======
        barColor(v) {
          if (v < 60) return 'var(--text-3)';
          if (v < 85) return 'var(--amber)';
          return 'var(--red)';
        },
        pingColor(v) {
          if (v === 0) return 'var(--text-3)';
          if (v < 100) return 'var(--green)';
          if (v < 200) return 'var(--amber)';
          return 'var(--red)';
        },
        toggleSort(field) {
          this.sortBy = (this.sortBy === field+'-desc') ? field+'-asc' : field+'-desc';
        },
        toast(msg, icon='✓') {
          const id = Date.now() + Math.random();
          this.toasts.push({ id, msg, icon });
          setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 2000);
        },
        cmdRun(idx) {
          const i = typeof idx==='number' ? idx : this.cmdActive;
          const r = this.cmdResults[i];
          if (!r) return;
          r.action();
          this.cmdOpen = false;
          this.cmdQuery = '';
        },
        openDetail(s) {
          this.detailServer = s;
          this.detailOpen = true;
          this.detailCharts = [
            { id:'dc-cpu',  title:'CPU 使用率',   value: s.cpu+'%',  color:'#737373' },
            { id:'dc-ram',  title:'内存使用率',   value: s.ram+'%',  color:'#737373' },
            { id:'dc-disk', title:'磁盘使用率',   value: s.disk+'%', color:'#737373' },
            { id:'dc-net',  title:'网络速率',     value: s.netIn+'/s', color:'#737373' },
          ];
          // 等抽屉动画大致到位（550ms）+ 详情段错峰动画到位（约 400ms）后再画
          setTimeout(() => this.redrawDetail(), 600);
        },
        redrawDetail() {
          const isDark = this.theme === 'dark';
          const gridColor = isDark ? '#1f1f1f' : '#ececec';
          const lineColor = isDark ? '#f5f5f5' : '#171717';
          const tickColor = isDark ? '#737373' : '#a3a3a3';
          const pts = 50;
          for (const c of this.detailCharts) {
            const ctx = document.getElementById(c.id);
            if (!ctx) continue;
            // 销毁旧实例
            if (ctx._chart) { try { ctx._chart.destroy(); } catch(e){} ctx._chart = null; }
            const labels = Array.from({length: pts}, (_, i) => i);
            const data = Array.from({length: pts}, () => Math.round(20 + Math.random() * 60));
            ctx._chart = new Chart(ctx, {
              type: 'line',
              data: {
                labels,
                datasets: [{
                  data, borderColor: lineColor, backgroundColor: 'transparent',
                  tension: 0.4, fill: false, borderWidth: 1.4,
                  pointRadius: 0, pointHoverRadius: 3,
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: false,
                resizeDelay: 0,
                animation: { duration: 600, easing: 'easeOutQuart' },
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    backgroundColor: lineColor,
                    titleColor: isDark ? '#0a0a0a' : '#fff',
                    bodyColor: isDark ? '#0a0a0a' : '#fff',
                    padding: 8, displayColors: false, cornerRadius: 4,
                    titleFont: { size: 11 }, bodyFont: { size: 11 }
                  }
                },
                scales: {
                  x: { display: false, grid: { display: false } },
                  y: {
                    beginAtZero: true,
                    suggestedMin: 0,
                    suggestedMax: 100,
                    ticks: { color: tickColor, font: { size: 10 }, maxTicksLimit: 4 },
                    grid: { color: gridColor, drawBorder: false }
                  }
                },
                interaction: { intersect: false, mode: 'index' },
                elements: { line: { tension: 0.4 } }
              }
            });
          }
        },
        initMap() {
          if (this._mapInited) {
            // 已初始化，等动画结束后强制重新计算尺寸
            setTimeout(() => this._map && this._map.invalidateSize(true), 700);
            return;
          }
          this._mapInited = true;
          // 等 view-fade 动画完成（700ms）再初始化，避免容器尺寸还在变化
          setTimeout(() => {
            const mapEl = document.getElementById('map');
            if (!mapEl) return;
            this._map = L.map('map', { zoomControl: true, attributionControl: false, worldCopyJump: false }).setView([20, 30], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { noWrap: true }).addTo(this._map);
            const COORDS = { HK:[22.3,114.1], SG:[1.35,103.8], JP:[35.7,139.7], US:[37.7,-95.7], DE:[51.1,10.4], FR:[46.6,1.8], CN:[35.8,104.2] };
            for (const s of this.servers) {
              const c = COORDS[s.country];
              if (!c) continue;
              const color = s.online ? '#22c55e' : '#ef4444';
              const html = `<div style="width:10px;height:10px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 0 0 1px ${color}"></div>`;
              L.marker(c, { icon: L.divIcon({ html, className:'', iconSize:[10,10] }) })
                .addTo(this._map)
                .bindPopup(`<b>${s.name}</b><br/>${s.country} · ${s.online?'在线':'离线'}`);
            }
            // 双保险：渲染完后再 invalidate 一次
            this._map.invalidateSize(true);
          }, 100);
        },

        init() {
          // 监听视图切换初始化地图 + 更新滑块位置
          this.$watch('currentView', (v) => {
            if (v === 'map') this.$nextTick(() => this.initMap());
            this.$nextTick(() => this.updateSeg());
          });
          // 监听抽屉
          this.$watch('cmdOpen', (v) => { if (v) this.$nextTick(() => this.$refs.cmdInput?.focus()); });

          // 关闭详情时销毁图表，避免重复绘制
          this.$watch('detailOpen', (v) => {
            if (!v) {
              for (const c of this.detailCharts) {
                const ctx = document.getElementById(c.id);
                if (ctx && ctx._chart) { try { ctx._chart.destroy(); } catch(e){} ctx._chart = null; }
              }
            }
          });

          // 初始化滑块位置
          this.$nextTick(() => this.updateSeg());
          // 窗口尺寸变化时重新计算
          window.addEventListener('resize', () => this.updateSeg());

          // 实时计时
          setInterval(() => {
            this.liveSeconds = (this.liveSeconds + 1) % 60;
            if (this.liveSeconds % 5 === 0) {
              for (const s of this.servers) {
                if (!s.online) continue;
                s.cpu = Math.max(0, Math.min(100, s.cpu + Math.round((Math.random() - 0.5) * 8)));
                s.ram = Math.max(0, Math.min(100, s.ram + Math.round((Math.random() - 0.5) * 4)));
                s.lastUpdate = Math.max(1, s.lastUpdate - 5 + Math.round(Math.random()*8));
              }
            }
          }, 1000);

          // 快捷键
          window.addEventListener('keydown', (e) => {
            const isInput = ['INPUT','TEXTAREA'].includes(document.activeElement.tagName);
            if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
              e.preventDefault(); this.cmdOpen = true;
            }
            if (e.key === '/' && !isInput && !this.cmdOpen) {
              e.preventDefault(); this.cmdOpen = true;
            }
            if (e.key === 'Escape') { this.detailOpen = false; }
          });

          // 自动检测系统主题
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            this.theme = 'dark';
          }
        },

        // 更新 segmented control 滑块位置
        updateSeg() {
          const seg = this.$refs.seg;
          if (!seg) return;
          const idx = this.views.findIndex(v => v.id === this.currentView);
          const target = seg.querySelector(`[data-seg-idx="${idx}"]`);
          if (!target) return;
          const left = target.offsetLeft;
          const width = target.offsetWidth;
          this.segStyle = `left:${left}px;width:${width}px;`;
        }
      };
    }
  </script>
</body>
</html>
